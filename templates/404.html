<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Digilatics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    .code {
      font-size: 96px;
      font-weight: 800;
      color: #e5e7eb;
      line-height: 1;
      letter-spacing: -4px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin: 16px 0 8px;
    }
    .desc {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn:hover { background: #1f2937; }
    .btn-outline {
      background: transparent;
      color: #6b7280;
      border: 1.5px solid #e5e7eb;
      margin-left: 10px;
    }
    .btn-outline:hover { background: #f3f4f6; color: #374151; }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #9ca3af;
      margin-bottom: 40px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Digilatics HRIS</div>
    <div class="code">404</div>
    <div class="title">Page not found</div>
    <div class="desc">
      The page you're looking for doesn't exist or has been moved.<br>
      Check the URL or go back to the portal.
    </div>
    <a href="/portal/" class="btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12L12 3l9 9"/><path d="M9 21V9h6v12"/></svg>
      Go to Portal
    </a>
    <a href="javascript:history.back()" class="btn btn-outline">← Go Back</a>
  </div>
</body>
</html>
