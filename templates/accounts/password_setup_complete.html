{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Activated — Funnelatics HR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}">
</head>
<body>
<div class="ep-login-page">
  <div class="ep-login-box">

    <div class="ep-login-logo">
      <div class="ep-login-logo-text">Funnelatics</div>
      <div style="font-size:12px;color:#9CA3AF;margin-top:4px;font-weight:500;">HR &amp; Employee Portal</div>
    </div>

    <div style="text-align:center;margin-bottom:20px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;
                  width:56px;height:56px;border-radius:50%;
                  background:rgba(44,49,146,.12);margin-bottom:16px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2c3192" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="ep-login-title" style="text-align:center;">Password activated</div>
      <div class="ep-login-sub" style="text-align:center;">
        Your account is ready. Sign in with your username and the password you just created.
      </div>
    </div>

    <a href="/portal/login/" class="ep-login-btn" style="display:block;text-align:center;text-decoration:none;">
      Sign in now
    </a>

  </div>
</div>
</body>
</html>
