{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Funnelatics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}">
</head>
<body>
<div class="ep-login-page">
  <div class="ep-login-box">

    <div class="ep-login-logo">
      <img src="{% static 'accounts/branding/funnelatics-logo.png' %}"
           alt="Funnelatics" style="max-height:52px;max-width:220px;object-fit:contain;display:block;margin:0 auto;">
      <div style="font-size:12px;color:#9CA3AF;margin-top:6px;font-weight:500;text-align:center;">HR &amp; Employee Portal</div>
    </div>

    <div class="ep-login-title">Forgot your password?</div>
    <div class="ep-login-sub">Enter your work email and we'll send you a reset link.</div>

    <form method="post" class="ep-login-form">
      {% csrf_token %}
      <div>
        <label class="ep-login-label" for="id_email">Work Email</label>
        <input class="ep-login-input" type="email" id="id_email" name="email"
               autocomplete="email" autofocus required placeholder="you@funnelatics.com">
      </div>
      <button type="submit" class="ep-login-btn">Send Reset Link</button>
    </form>

    <div class="ep-login-admin" style="margin-top:16px;">
      <a href="{% url 'portal:login' %}" style="color:var(--brand);text-decoration:none;font-weight:600;">← Back to Sign In</a>
    </div>

  </div>
</div>
</body>
</html>
