{% extends "portal/hr/base.html" %}
{% block title %}Confirm Delete — Digilatics HR{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto;">
  <div class="ep-card">
    <div class="ep-card-body" style="text-align:center;padding:40px 32px;">
      <div style="width:60px;height:60px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" width="28" height="28">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>
      <div style="font-size:20px;font-weight:800;color:var(--text-1);margin-bottom:8px;">{{ title }}</div>
      <div style="font-size:14px;color:var(--text-2);margin-bottom:28px;">Are you sure you want to delete:<br><strong style="color:var(--text-1);">{{ description }}</strong></div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <a href="{{ back_url }}" class="hr-modal-cancel" style="text-decoration:none;display:inline-flex;align-items:center;padding:10px 20px;">Cancel</a>
        <form method="post">
          {% csrf_token %}
          <button type="submit" style="padding:10px 24px;background:#ef4444;color:white;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;">
            Delete
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
