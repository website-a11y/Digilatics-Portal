{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email — Funnelatics</title>
  <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}">
</head>
<body>
<div class="ep-login-page">
  <div class="ep-login-box" style="text-align:center;">

    <div class="ep-login-logo">
      <img src="{% static 'accounts/branding/funnelatics-logo.png' %}"
           alt="Funnelatics" style="max-height:52px;max-width:220px;object-fit:contain;display:block;margin:0 auto;">
    </div>

    <div style="margin:24px auto;width:60px;height:60px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <div class="ep-login-title" style="font-size:20px;">Check your email</div>
    <div class="ep-login-sub" style="margin-top:8px;">
      We've sent a password reset link to your email address.<br>
      It expires in 1 hour — check your spam folder if you don't see it.
    </div>

    <div style="margin-top:28px;">
      <a href="{% url 'portal:login' %}" class="ep-login-btn" style="display:block;text-align:center;text-decoration:none;">Back to Sign In</a>
    </div>

  </div>
</div>
</body>
</html>
